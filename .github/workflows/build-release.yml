# Build & deploy BosowAgent.exe — triggered by VERSION TAG PUSH only (not by `git push` to a branch).
#
# How to release v1.0.7:
#   1. Commit and push your code:  git push origin main
#   2. Create an annotated tag (recommended):  git tag -a v1.0.7 -m "release 1.0.7"
#      Or lightweight:  git tag v1.0.7
#   3. Push the tag to GitHub:  git push origin v1.0.7
# Tag must match pattern v* (e.g. v1.0.7). Not "v.1.0.7" with an extra dot after v.
#
# Manual test run (Actions tab → "Run workflow"): workflow_dispatch with version 1.0.99
#
name: Build and Release BosowAgent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tanpa prefix v (contoh: 1.0.8) — untuk uji build manual'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.5.0

      - name: Extract version from tag or workflow input
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch AGENT_VERSION in config.py
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $c = Get-Content agent/config.py -Raw
          $c = $c -replace "AGENT_VERSION = '[^']*'", "AGENT_VERSION = '$v'"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$pwd/agent/config.py", $c, $utf8NoBom)

      - name: Build with PyInstaller
        run: python -m PyInstaller build/bosowa_agent.spec --distpath build/dist --workpath build/work --noconfirm

      - name: Verify build output
        shell: bash
        run: |
          test -f build/dist/BosowAgent.exe
          echo "Build OK: $(wc -c < build/dist/BosowAgent.exe) bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BosowAgent-exe
          path: build/dist/BosowAgent.exe
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: BosowAgent-exe
          path: ./dist

      - name: Deploy exe to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/BosowAgent.exe
          target: /var/www/downloads/
          strip_components: 1

      - name: Update VPS env and restart portal
        uses: appleboy/ssh-action@v1
        env:
          VERSION: ${{ needs.build.outputs.version }}
          DOWNLOAD_URL: https://portal.bosowa.co.id/downloads/BosowAgent.exe
          ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VERSION,DOWNLOAD_URL,ENV_FILE
          script: |
            mkdir -p /var/www/downloads
            # Write version file — portal reads this at runtime (no env var / restart needed)
            echo -n "$VERSION" > /var/www/downloads/BosowAgent.version
            # Keep env file in sync as fallback
            grep -q "^AGENT_LATEST_VERSION=" "$ENV_FILE" \
              && sed -i "s/^AGENT_LATEST_VERSION=.*/AGENT_LATEST_VERSION=$VERSION/" "$ENV_FILE" \
              || echo "AGENT_LATEST_VERSION=$VERSION" >> "$ENV_FILE"
            grep -q "^AGENT_DOWNLOAD_URL=" "$ENV_FILE" \
              && sed -i "s|^AGENT_DOWNLOAD_URL=.*|AGENT_DOWNLOAD_URL=$DOWNLOAD_URL|" "$ENV_FILE" \
              || echo "AGENT_DOWNLOAD_URL=$DOWNLOAD_URL" >> "$ENV_FILE"
            pm2 restart bosowa-portal --update-env

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BosowAgent.exe
          generate_release_notes: true
